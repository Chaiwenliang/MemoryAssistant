name: MemoryAssistant
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: MemoryAssistant
    SWIFT_VERSION: 5.9
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
targets:
  MemoryAssistant:
    type: application
    platform: iOS
    sources:
      - path: MemoryAssistant
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MemoryAssistant
        INFOPLIST_KEY_CFBundleDisplayName: 记忆助手
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 允许你通过语音快速记录信息
        INFOPLIST_KEY_NSSiriUsageDescription: 允许你通过 Siri 快速查询已经记录的事项
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: 允许你把语音转换成文字并保存为记录
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen: {}
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets: []
